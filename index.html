<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Cloud Web Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #2563eb, #1e3a8a);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .container {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 400px;
        }

        h1 {
            margin-bottom: 15px;
        }

        p {
            margin-bottom: 20px;
        }

        img {
            border-radius: 10px;
            margin-bottom: 20px;
        }

        a {
            display: inline-block;
            padding: 10px 20px;
            background-color: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>My First Cloud Web Page</h1>
        <p>Welcome to my web page hosted on the cloud!</p>
        <img src="https://via.placeholder.com/150" alt="Sample Image">
        <br>
        <a href="https://www.google.com" target="_blank">Visit Google</a>
    </div>

</body>
</html>
